<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>500 - Server Error</title>
  <style>
    :root {
      --bg: #f4efe5;
      --card: #fffaf3;
      --ink: #1a2220;
      --muted: #5f6b67;
      --line: #cdbfa8;
      --accent: #1d7b5f;
      --accent-2: #ef7f45;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 82% 14%, rgba(239, 127, 69, 0.18), transparent 40%),
        radial-gradient(circle at 10% 84%, rgba(29, 123, 95, 0.16), transparent 40%),
        linear-gradient(160deg, #f9f4ea, var(--bg));
      padding: 18px;
    }
    .card {
      width: min(640px, 96vw);
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--card);
      box-shadow: 0 18px 34px rgba(17, 25, 23, 0.14);
      padding: 26px 24px;
    }
    .code {
      margin: 0 0 8px;
      font-size: 0.88rem;
      letter-spacing: 0.08em;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
    }
    h1 {
      margin: 0 0 10px;
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      font-size: clamp(1.4rem, 2.8vw, 2rem);
      line-height: 1.15;
    }
    p {
      margin: 0 0 16px;
      color: var(--muted);
      max-width: 52ch;
    }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    a.btn {
      display: inline-block;
      text-decoration: none;
      color: #fff;
      font-weight: 600;
      border-radius: 10px;
      padding: 10px 14px;
      background: linear-gradient(130deg, var(--accent), var(--accent-2));
    }
    a.btn.secondary {
      background: #fff;
      color: var(--ink);
      border: 1px solid var(--line);
    }
    a.btn:hover { filter: brightness(1.05); }
  </style>
</head>
<body>
  <main class="card">
    <p class="code">Error 500</p>
    <h1>Something Went Wrong</h1>
    <p>The server encountered an unexpected error. Try reloading the page or return to the dashboard.</p>
    <div class="actions">
      <a class="btn" href="/">Back To Dashboard</a>
      <a class="btn secondary" href="javascript:location.reload()">Try Again</a>
    </div>
  </main>
</body>
</html>
